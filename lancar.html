<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançar Validade - Vencimentos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="user-icon" aria-label="Voltar">←</a>
  <h1>Lançar</h1>
  <a href="login.html" class="user-icon" aria-label="Login">👤</a>
</header>

<main class="container">
  <section class="card">
    <h2>Novo lançamento</h2>
    <p class="muted">Aponte para o código de barras inteiro. Se o produto não estiver salvo, o sistema tenta buscar nome e foto na API.</p>

    <div class="button-row">
      <button type="button" id="btn-camera">📷 Escanear EAN</button>
      <button type="button" id="btn-parar-camera" class="secondary" style="display:none;">Parar câmera</button>
    </div>

    <div id="reader"></div>

    <div class="scanner-ajuda">
      <p id="scanner-status">Aponte a câmera para o código de barras inteiro.</p>
      <small>Deixe o código bem iluminado, reto e um pouco afastado da câmera.</small>
    </div>

    <form id="form-lancamento">
      <label for="ean">Código EAN</label>
      <input type="text" id="ean" placeholder="Ex: 789..." inputmode="numeric" required>

      <label for="nomeProduto">Nome do produto</label>
      <input type="text" id="nomeProduto" placeholder="Será preenchido se o produto estiver cadastrado" required>

      <div id="produto-preview"></div>

      <label for="setor">Setor</label>
      <select id="setor" required>
        <option value="">Selecione o setor</option>
        <option value="Mercearia">🛒 Mercearia</option>
        <option value="Bebidas">🥤 Bebidas</option>
        <option value="Frios e Laticínios">🧀 Frios e Laticínios</option>
        <option value="Açougue">🥩 Açougue</option>
        <option value="Hortifruti">🥬 Hortifruti</option>
        <option value="Padaria">🥖 Padaria</option>
        <option value="Congelados">❄️ Congelados</option>
        <option value="Limpeza">🧼 Limpeza</option>
        <option value="Higiene e Perfumaria">🧴 Higiene e Perfumaria</option>
        <option value="Pet">🐾 Pet</option>
        <option value="Outros">📦 Outros</option>
      </select>

      <label for="quantidade">Quantidade</label>
      <input type="number" id="quantidade" placeholder="Quantidade de itens" min="1" required>

      <label for="validade">Data de validade</label>
      <input type="date" id="validade" required>

      <button type="submit">Salvar lançamento</button>
    </form>
  </section>
</main>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="auth.js"></script>
<script src="cookies.js"></script>
<script src="api-produtos.js"></script>
<script src="lancar.js"></script>
</body>
</html>
