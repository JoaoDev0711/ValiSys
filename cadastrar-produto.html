<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Produto - Vencimentos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <a href="dashboard.html" class="user-icon" aria-label="Voltar">←</a>
  <h1>Produto</h1>
  <a href="#" onclick="sair()" class="user-icon" aria-label="Sair">🚪</a>
</header>

<main class="container">
  <section class="card">
    <h2>Cadastrar produto</h2>
    <p class="muted">Gerente e admin podem cadastrar produtos. Ao escanear ou digitar um EAN válido, o sistema puxa os dados automaticamente.</p>

    <div class="button-row">
      <button type="button" id="btn-camera">📷 Escanear EAN</button>
      <button type="button" id="btn-parar-camera" class="secondary" style="display:none;">Parar câmera</button>
    </div>

    <div id="reader"></div>

    <div class="scanner-ajuda">
      <p id="scanner-status">Aponte a câmera para o código de barras inteiro.</p>
      <small>Deixe o código bem iluminado, reto e um pouco afastado da câmera.</small>
    </div>
<form id="form-produto">
      <label for="ean">Código EAN</label>
      <input type="text" id="ean" placeholder="Digite ou escaneie o EAN/GTIN" inputmode="numeric" required>

      <label for="nome">Nome do produto</label>
      <input type="text" id="nome" placeholder="Digite o nome do produto" required>

      <label for="marca">Marca</label>
      <input type="text" id="marca" placeholder="Ex: Finna">

      <label for="fabricante">Fabricante</label>
      <input type="text" id="fabricante" placeholder="Ex: M. Dias Branco">

      <label for="sabor">Sabor ou variação</label>
      <input type="text" id="sabor" placeholder="Ex: Morango, Chocolate, Natural">

      <label for="categoria">Categoria</label>
      <input type="text" id="categoria" placeholder="Ex: Laticínios">

      <div class="form-grid-2">
        <div>
          <label for="quantidadePadrao">Quantidade padrão</label>
          <input type="text" id="quantidadePadrao" placeholder="Ex: 1L, 500g, 12 un">
        </div>

        <div>
          <label for="porcao">Porção</label>
          <input type="text" id="porcao" placeholder="Ex: 200ml, 30g">
        </div>
      </div>

      <label for="embalagem">Embalagem</label>
      <input type="text" id="embalagem" placeholder="Ex: Caixa, garrafa, pacote plástico">

      <label for="origem">Origem</label>
      <input type="text" id="origem" placeholder="Ex: Brasil">

      <label for="paises">Países</label>
      <input type="text" id="paises" placeholder="Ex: Brasil, Argentina">

      <label for="lojasEncontradas">Lojas encontradas</label>
      <input type="text" id="lojasEncontradas" placeholder="Ex: Mercado, atacado, loja online">

      <label for="ingredientes">Ingredientes</label>
      <textarea id="ingredientes" rows="3" placeholder="Ingredientes do produto"></textarea>

      <label for="alergicos">Alérgicos</label>
      <textarea id="alergicos" rows="2" placeholder="Ex: contém leite, glúten, soja"></textarea>

      <label for="rastros">Pode conter / traços</label>
      <textarea id="rastros" rows="2" placeholder="Ex: pode conter amendoim, ovos"></textarea>

      <div class="form-grid-3">
        <div>
          <label for="nutriscore">Nutri-Score</label>
          <input type="text" id="nutriscore" placeholder="Ex: A, B, C">
        </div>

        <div>
          <label for="ecoscore">Eco-Score</label>
          <input type="text" id="ecoscore" placeholder="Ex: A, B, C">
        </div>

        <div>
          <label for="nova">NOVA</label>
          <input type="text" id="nova" placeholder="Ex: 1, 2, 3, 4">
        </div>
      </div>

      <label for="fonteProduto">Fonte</label>
      <input type="text" id="fonteProduto" placeholder="Ex: cadastro manual, base pública de produtos">

      <label for="fotoArquivo">Foto do produto</label>
      <input type="file" id="fotoArquivo" accept="image/*" capture="environment">

      <div id="preview-foto"></div>

      <button type="submit">Salvar produto</button>
    </form>
  </section>

  <section>
    <h2>Produtos cadastrados</h2>
    <div id="lista-produtos"></div>
  </section>
</main>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/dados-config.js"></script>
<script src="js/dados-service.js"></script>
<script src="js/catalogo-produtos-base.js"></script>
<script src="js/auth.js"></script>
<script src="js/cookies.js"></script>
<script src="js/loja.js"></script>
<script src="js/site-dialog.js"></script>
<script src="js/icons.js"></script>
<script src="js/produtos-fonte.js"></script>
<script src="js/produto.js"></script>
</body>
</html>
