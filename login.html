<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vencimentos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="login-page">
  <section class="login-card">
    <a href="index.html" class="voltar-site">← Voltar para o site</a>
    <div class="login-logo">📦</div>
    <h1>Entrar</h1>
    <p>Entre com seu nome e escolha sua função no mercado.</p>

    <form id="login-form">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Ex: João" autocomplete="name" required>

      <label for="cargo">Cargo</label>
      <select id="cargo" required>
        <option value="">Selecione o cargo</option>
        <option value="promotor">Promotor</option>
        <option value="encarregado">Encarregado</option>
        <option value="gerente">Gerente</option>
        <option value="admin">Admin</option>
      </select>

      <div id="senha-area" style="display:none;">
        <label for="senha">Senha do cargo</label>
        <input type="password" id="senha" placeholder="Digite a senha do cargo">
        <p class="small muted">
          A senha é exigida para encarregado, gerente e admin.
        </p>
      </div>

      <button type="submit">Entrar</button>
    </form>
  </section>
</main>

<script src="cookies.js"></script>
<script src="login.js"></script>
</body>
</html>
