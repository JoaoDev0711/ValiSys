<body>

<header class="topbar">
  <a href="dashboard.html" class="user-icon" aria-label="Voltar">←</a>
  <h1>Assinatura</h1>
  <a href="#" onclick="sair()" class="user-icon" aria-label="Sair">Sair</a>
</header>

<main class="container">
  <section class="loja-atual-card compact">
    <div>
      <div>
        <strong id="loja-assinatura-atual">Loja não selecionada</strong>
        <p>Cobranças e plano vinculados a esta loja.</p>
      </div>
    </div>
    <a href="planos.html">Planos</a>
  </section>

  <section class="welcome-card">
    <p class="muted">Financeiro</p>
    <h2>Minha assinatura</h2>
    <p>Veja o plano atual, as cobranças dos próximos 12 meses e escolha um meio de pagamento disponível.</p>
  </section>

  <section id="assinatura-resumo"></section>

  <section class="card">
    <div class="section-title">
      <div>
        <h2>Próximos 12 meses</h2>
        <p class="muted">Cobranças da loja em ordem de vencimento.</p>
      </div>
      <span></span>
    </div>
  </section>

  <section id="cobrancas-12-meses"></section>
</main>

<div id="modal-pagamento" class="payment-modal" aria-hidden="true">
  <div class="payment-modal-card">
    <div id="modal-pagamento-conteudo"></div>
  </div>
</div>
