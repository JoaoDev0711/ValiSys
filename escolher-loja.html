<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolher loja - Vencimentos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <a href="dashboard.html" class="user-icon" aria-label="Voltar">←</a>
  <h1>Escolher loja</h1>
  <a href="login.html" class="user-icon" aria-label="Login">👤</a>
</header>

<main class="container">
  <section class="card">
    <h2>Identifique a loja</h2>
    <p class="muted">
      Antes de lançar vencimentos, escolha a loja correta. Isso evita registros no mercado errado.
    </p>
  </section>

  <section class="card" id="form-nova-loja-area">
    <h2>Cadastrar loja</h2>
    <p class="muted">Cadastro disponível para gerente e admin. Exclusão disponível apenas para admin e somente sem lançamentos.</p>

    <form id="form-loja">
      <label for="nomeLoja">Nome da loja</label>
      <input type="text" id="nomeLoja" placeholder="Ex: Mercado São João">

      <label for="responsavelLoja">Responsável</label>
      <input type="text" id="responsavelLoja" placeholder="Ex: Carlos - Gerente">

      <button type="submit">Salvar loja</button>
    </form>
  </section>

  <section>
    <h2>Lojas disponíveis</h2>
    <div id="lista-lojas"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/supabase-service.js"></script>
<script src="js/auth.js"></script>
<script src="js/cookies.js"></script>
<script src="js/loja.js"></script>
<script src="js/escolher-loja.js"></script>
</body>
</html>
