<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolher loja - Vencimentos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="user-icon" aria-label="Voltar">←</a>
  <h1>Escolher loja</h1>
  <a href="login.html" class="user-icon" aria-label="Login">👤</a>
</header>

<main class="container">
  <section class="card">
    <h2>Escolha a loja</h2>
    <p class="muted">
      Escolha a loja antes de entrar. Assim o sistema mostra os funcionários certos e evita registros no mercado errado.
    </p>
  </section>

  <section class="card">
    <h2>Filtrar lojas</h2>
    <div class="lista-filtros">
      <div>
        <label for="filtroGrupoLoja">Grupo/Rede</label>
        <select id="filtroGrupoLoja">
          <option value="todos">Todos os grupos</option>
        </select>
      </div>

      <div>
        <label for="filtroRegiaoLoja">Região</label>
        <select id="filtroRegiaoLoja">
          <option value="todas">Todas as regiões</option>
        </select>
      </div>
    </div>
  </section>

  <section>
    <h2>Lojas disponíveis</h2>
    <div id="lista-lojas"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/dados-config.js"></script>
<script src="js/dados-service.js"></script>
<script src="js/auth.js"></script>
<script src="js/cookies.js"></script>
<script src="js/loja.js"></script>
<script src="js/escolher-loja.js"></script>
</body>
</html>
